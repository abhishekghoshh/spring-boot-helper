spring:
  application:
    name: spring-aws
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: ${JAVA_VIRTUAL_THREADS_ENABLED:true}
  jackson:
    property-naming-strategy: SNAKE_CASE

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}



server:
  port: {SERVER_PORT:8080}

app:
  version: "${APP_VERSION:1.0.0}"

logging:
  pattern:
    console: "%d{dd-MM-yyyy HH:mm:ss.SSS}|%X{appName}|%thread|%level|%logger.%M|%X{uid}|%X{uri}|%X{method}|%msg%n"
  level:
    root: INFO
    io.github.abhishekghoshh: ${APPLICATION_LOGGING_LEVEL:debug}
